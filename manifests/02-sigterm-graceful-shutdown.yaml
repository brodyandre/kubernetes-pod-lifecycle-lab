apiVersion: apps/v1
kind: Deployment
metadata:
  name: sigterm-graceful-shutdown
  namespace: pod-lifecycle-lab
  labels:
    app: pod-lifecycle-app
    scenario: sigterm-graceful-shutdown
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-lifecycle-app
      scenario: sigterm-graceful-shutdown
  template:
    metadata:
      labels:
        app: pod-lifecycle-app
        scenario: sigterm-graceful-shutdown
    spec:
      # O Kubernetes envia SIGTERM e aguarda este tempo antes de forcar o encerramento.
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: brodyandre/pod-lifecycle-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
