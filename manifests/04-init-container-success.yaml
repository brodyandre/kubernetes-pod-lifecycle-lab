apiVersion: v1
kind: Pod
metadata:
  name: init-success-pod
  namespace: pod-lifecycle-lab
  labels:
    app: nginx
    scenario: init-container-success
spec:
  restartPolicy: Never
  volumes:
    - name: shared-workdir
      emptyDir: {}
  initContainers:
    # O initContainer executa antes do container principal e prepara o ambiente.
    - name: init-prepare-environment
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "Preparacao concluida em $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /work/init-status.txt
          echo "Arquivo de preparacao criado com sucesso."
      volumeMounts:
        - name: shared-workdir
          mountPath: /work
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - name: http
          containerPort: 80
      command:
        - /bin/sh
        - -c
        - |
          echo "Container principal iniciado somente apos init com sucesso."
          cat /work/init-status.txt
          nginx -g "daemon off;"
      volumeMounts:
        - name: shared-workdir
          mountPath: /work
