apiVersion: v1
kind: Pod
metadata:
  name: init-fixed-pod
  namespace: pod-lifecycle-lab
  labels:
    app: nginx
    scenario: init-container-fixed
spec:
  restartPolicy: Always
  volumes:
    - name: shared-workdir
      emptyDir: {}
  initContainers:
    - name: init-create-dependency
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "ready" > /work/ready.flag
          echo "Dependencia criada com sucesso em $(date -u +%Y-%m-%dT%H:%M:%SZ)."
      volumeMounts:
        - name: shared-workdir
          mountPath: /work
    - name: init-validate-dependency
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          test -f /work/ready.flag
          echo "Check aprovado. Pod pode iniciar."
      volumeMounts:
        - name: shared-workdir
          mountPath: /work
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - name: http
          containerPort: 80
      command:
        - /bin/sh
        - -c
        - |
          echo "Container principal iniciado apos init bem-sucedido."
          cat /work/ready.flag
          nginx -g "daemon off;"
      volumeMounts:
        - name: shared-workdir
          mountPath: /work
